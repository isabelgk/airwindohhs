name: Import New Airwindows Plugins

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Import only this exact plugin name (optional, for testing one)"
        required: false
      max_plugins:
        description: "Max number of new plugins to import this run (0 = unlimited)"
        default: "5"

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - id: list
        run: |
          if [ -n "${{ inputs.plugin }}" ]; then
            echo "plugins=$(jq -cn --arg p "${{ inputs.plugin }}" '[$p]')" >> "$GITHUB_OUTPUT"
          else
            mapfile -t missing < <(uv run grab --list-missing)
            max="${{ inputs.max_plugins }}"
            if [ "$max" != "0" ]; then
              missing=("${missing[@]:0:$max}")
            fi
            printf '%s\n' "${missing[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))' > plugins.json
            echo "plugins=$(cat plugins.json)" >> "$GITHUB_OUTPUT"
          fi

  import:
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          slug=$(echo "${{ matrix.plugin }}" | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "branch=airwindows-import/$slug" >> "$GITHUB_OUTPUT"

      - id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr list --head "${{ steps.meta.outputs.branch }}" --state open --json number --jq 'length')
          echo "skip=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - if: steps.existing.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v5

      - if: steps.existing.outputs.skip == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang clang-format
          uv sync

      - if: steps.existing.outputs.skip == 'false'
        run: uv run grab --plugin "${{ matrix.plugin }}"

      - if: steps.existing.outputs.skip == 'false'
        id: verify
        run: |
          new_file=$(git status --porcelain | awk '$1=="??"{print $2}' | grep '^include/' | head -1)
          if [ -z "$new_file" ]; then
            echo "::warning::grab produced no header for ${{ matrix.plugin }}"
            echo "generated=false" >> "$GITHUB_OUTPUT"
          else
            echo "generated=true" >> "$GITHUB_OUTPUT"
            echo "file=$new_file" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.verify.outputs.generated == 'true'
        run: clang-format -i "${{ steps.verify.outputs.file }}"

      - if: steps.verify.outputs.generated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.meta.outputs.branch }}"
          git add "${{ steps.verify.outputs.file }}"
          git commit -m "Add ${{ matrix.plugin }}"
          git push -u origin "${{ steps.meta.outputs.branch }}"
          gh pr create --title "Add ${{ matrix.plugin }}" \
            --body "Auto-generated by the Import New Airwindows Plugins workflow." \
            --base main --head "${{ steps.meta.outputs.branch }}"
