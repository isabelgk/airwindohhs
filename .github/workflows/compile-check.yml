name: Compile Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - run: python3 scripts/check_compile.py --cxx clang++
